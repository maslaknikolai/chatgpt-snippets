name: Release

on:
  push:
    branches: [main]

jobs:
  check:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      exists: ${{ steps.tag_check.outputs.exists }}
      version: ${{ steps.pkg.outputs.version }}
    steps:
      - uses: actions/checkout@v5

      - name: Get version
        id: pkg
        run: echo "version=$(node -p "require('./package.json').version")" >> $GITHUB_OUTPUT

      - name: Check tag exists
        id: tag_check
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="v${{ steps.pkg.outputs.version }}"
          if gh release view "$TAG" &>/dev/null; then
            echo "exists=true" >> $GITHUB_OUTPUT
          else
            echo "exists=false" >> $GITHUB_OUTPUT
          fi

  build-and-release:
    needs: check
    if: needs.check.outputs.exists == 'false'
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v5

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v5
        with:
          node-version-file: '.nvmrc'
          cache: 'pnpm'

      - run: pnpm install --frozen-lockfile

      - run: pnpm build

      - name: Zip Chrome dist
        run: cd dist && zip -r ../chatgpt-snippets-chrome-${{ needs.check.outputs.version }}.zip .

      - name: Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="v${{ needs.check.outputs.version }}"
          gh release create "$TAG" \
            --title "$TAG" \
            --latest \
            chatgpt-snippets-chrome-${{ needs.check.outputs.version }}.zip
